{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="flex justify-center items-center min-h-[60vh]">

<div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">

<h2 class="text-2xl font-bold mb-6 text-center">
Login to SEOVista
</h2>

{% if messages %}
    {% for message in messages %}
        <p class="text-red-500 mb-4 text-center">
            {{ message }}
        </p>
    {% endfor %}
{% endif %}

<form method="POST" class="space-y-4">

{% csrf_token %}

<input
type="text"
name="username"
placeholder="Username"
required
class="w-full border px-4 py-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
/>

<input
type="password"
name="password"
placeholder="Password"
required
class="w-full border px-4 py-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
/>

<button
type="submit"
class="w-full bg-blue-600 text-white py-3 rounded hover:bg-blue-700 transition">

Login

</button>

</form>

<p class="text-center text-gray-600 mt-6">

Don't have an account?

<a href="/register/" class="text-blue-600 hover:underline">
Register
</a>

</p>

</div>

</div>

{% endblock %}
