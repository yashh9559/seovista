{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="flex justify-center items-center min-h-[70vh] bg-gray-50">

```
<div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

    <h2 class="text-3xl font-bold mb-6 text-center text-gray-800">
        Login to <span class="text-blue-600">SEOVista</span>
    </h2>

    {% if messages %}
        {% for message in messages %}
            <p class="text-red-500 mb-4 text-center font-medium">
                {{ message }}
            </p>
        {% endfor %}
    {% endif %}

    <form method="POST" class="space-y-5">

        {% csrf_token %}

        <!-- Username -->
        <input
            type="text"
            name="username"
            placeholder="Username"
            required
            class="w-full border px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
        />

        <!-- Password -->
        <input
            type="password"
            name="password"
            placeholder="Password"
            required
            class="w-full border px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
        />

        <!-- Remember Me -->
        <div class="flex items-center justify-between text-sm text-gray-600">
            <label class="flex items-center space-x-2 cursor-pointer">
                <input type="checkbox" name="remember_me" class="accent-blue-600">
                <span>Remember Me</span>
            </label>

            <!-- Optional future feature -->
            <a href="#" class="text-blue-600 hover:underline">
                Forgot Password?
            </a>
        </div>

        <!-- Submit -->
        <button
            type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-semibold shadow-md">

            Login

        </button>

    </form>

    <!-- Register Link -->
    <p class="text-center text-gray-600 mt-6">
        Don't have an account?
        <a href="/register/" class="text-blue-600 hover:underline font-medium">
            Register
        </a>
    </p>

</div>
```

</div>

{% endblock %}
